name: karigar
description: "Pakistan's Most Trusted Home Services Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.0.0
  go_router: ^10.0.0
  dio: ^5.3.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0
  cupertino_icons: ^1.0.0
  url_launcher: ^6.2.0
  flutter_native_splash: ^2.4.7
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  firebase_analytics: ^12.4.3
  flutter_local_notifications: ^19.4.0
  google_maps_flutter: ^2.14.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/app_logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
