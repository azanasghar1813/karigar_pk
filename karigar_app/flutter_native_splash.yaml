flutter_native_splash:
  # Dark branded background — matches the Flutter splash so there's no jarring color jump.
  color: "#0A0E27"
  color_dark: "#0A0E27"

  # App logo shown in the center of the native splash.
  image: assets/images/app_logo.png
  image_dark: assets/images/app_logo.png

  # Keep the native splash visible until Flutter calls
  # FlutterNativeSplash.remove() — we control the exact moment.
  fullscreen: false

  android_12:
    color: "#0A0E27"
    color_dark: "#0A0E27"
    image: assets/images/app_logo.png
    image_dark: assets/images/app_logo.png
