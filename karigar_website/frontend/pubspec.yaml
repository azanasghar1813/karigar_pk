name: karigar_pk
description: "Pakistan's Most Trusted Home Services Platform - Flutter App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core & State Management
  provider: ^6.0.0
  get_it: ^7.5.0
  freezed_annotation: ^2.4.0

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0

  # Navigation & Routing
  go_router: ^10.0.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Image Handling
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0
  flutter_image_compress: ^1.1.0

  # Icons
  cupertino_icons: ^1.0.0
  flutter_svg: ^2.0.0

  # UI Components
  flutter_spinkit: ^5.2.0
  smooth_page_indicator: ^1.1.0
  intl: ^0.18.0
  phone_number: ^2.0.0

  # Notifications
  firebase_core: ^2.22.0
  firebase_messaging: ^14.6.0

  # Device Info
  device_info_plus: ^9.1.0
  connectivity_plus: ^5.0.0

  # PDF Export
  pdf: ^3.10.0
  printing: ^5.11.0

  # Analytics
  firebase_analytics: ^10.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/

  # Fonts
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
    
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
